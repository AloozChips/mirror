name: Pixeldrain → Cloudflare R2 Mirror

on:
  workflow_dispatch:
    inputs:
      pd_url:
        description: 'Pixeldrain File URL'
        required: true
        type: string
      r2_bucket:
        description: 'R2 Bucket Name'
        required: true
        type: string
      r2_folder:
        description: 'R2 Folder Path (Optional)'
        required: false
        type: string
        default: ''

jobs:
  mirror:
    runs-on: ubuntu-latest

    env:
      PD_URL: ${{ inputs.pd_url }}
      R2_BUCKET: ${{ inputs.r2_bucket }}
      R2_FOLDER: ${{ inputs.r2_folder }}

      CYAN: '\033[0;36m'
      GREEN: '\033[0;32m'
      YELLOW: '\033[1;33m'
      BLUE: '\033[0;34m'
      NC: '\033[0m'

    steps:
      - name: Extract Pixeldrain metadata
        run: |
          echo -e "${BLUE}=======================================${NC}"
          echo -e "${CYAN}🔍 ANALYZING PIXELDRAIN URL...${NC}"

          FILE_ID=$(echo "${PD_URL}" | sed -E 's/.*\/(u|file)\/([a-zA-Z0-9]+).*/\2/')
          INFO_JSON=$(curl -sL "https://pixeldrain.com/api/file/${FILE_ID}/info")
          FILE_NAME=$(echo "$INFO_JSON" | jq -r '.name // empty')

          if [ -z "$FILE_NAME" ] || [ "$FILE_NAME" = "null" ]; then
            echo -e "${YELLOW}❌ File not found.${NC}"
            exit 1
          fi

          echo -e "${GREEN}✅ Detected: $FILE_NAME${NC}"

          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

      - name: Download file
        run: |
          echo -e "${CYAN}📥 DOWNLOADING...${NC}"

          curl -L --progress-bar --fail \
            "https://pixeldrain.com/api/file/${FILE_ID}" \
            -o "$FILE_NAME"

          FILE_SIZE_BYTES=$(stat -c%s "$FILE_NAME")
          echo "FILE_SIZE_BYTES=$FILE_SIZE_BYTES" >> $GITHUB_ENV

          echo -e "${YELLOW}📦 SIZE: $FILE_SIZE_BYTES bytes${NC}"

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone (Cloudflare R2)
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload to R2
        run: |
          if [ -n "$R2_FOLDER" ]; then
            CLEAN_FOLDER=$(echo "$R2_FOLDER" | sed 's:^/*::' | sed 's:/*$::')
            TARGET="r2:${R2_BUCKET}/${CLEAN_FOLDER}"
            DESTINATION="${R2_BUCKET}/${CLEAN_FOLDER}"
          else
            TARGET="r2:${R2_BUCKET}"
            DESTINATION="${R2_BUCKET}"
          fi

          echo "DESTINATION=$DESTINATION" >> $GITHUB_ENV

          echo -e "${CYAN}📤 UPLOADING TO R2...${NC}"

          rclone copy \
            "$FILE_NAME" \
            "$TARGET" \
            --progress

      - name: Generate Checksums
        run: |
          MD5=$(md5sum "$FILE_NAME" | awk '{print $1}')
          SHA=$(sha256sum "$FILE_NAME" | awk '{print $1}')

          echo "MD5_SUM=$MD5" >> $GITHUB_ENV
          echo "SHA_SUM=$SHA" >> $GITHUB_ENV

          echo -e "${GREEN}🔐 CHECKSUMS GENERATED${NC}"

      - name: Telegram Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ <b>Mirror Success!</b> 🎉"

            TEXT="$STATUS%0A%0A📦 <b>File:</b> <code>$FILE_NAME</code>%0A🚨 <b>Size:</b> <code>$FILE_SIZE_BYTES</code> bytes%0A📍 <b>Destination:</b> <code>$DESTINATION</code>%0A<b>🔐 MD5:</b> <code>$MD5_SUM</code>%0A<b>🛡️ SHA256:</b> <code>$SHA_SUM</code>"
          else
            STATUS="❌ <b>Mirror Failed!</b>"

            LOG_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            TEXT="$STATUS%0A%0A📍 <b>Destination:</b> <code>$DESTINATION</code>%0A⁉️ <a href='$LOG_URL'>View Error Logs</a>"
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            -d "text=$TEXT"
